name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  client-lint:
    name: Client Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          # Fresh, platform-correct resolve on the Linux runner. When a
          # package-lock.json generated on another OS (macOS) is present, npm
          # trusts its pruned optional-dependency tree and skips the Linux
          # native binaries the build needs — e.g. @rollup/rollup-linux-x64-gnu
          # and @tailwindcss/oxide-linux-x64-gnu (npm/cli#4828). Removing the
          # lockfile forces a full resolution that installs the Linux binaries.
          # (The root "workspaces" field was removed so this stays scoped to
          # client/ and no longer hoists to the repo-root node_modules.)
          rm -f package-lock.json
          npm install

      - name: Run ESLint
        run: |
          cd client
          npm run lint

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Check build output
        run: |
          cd client
          ls -la dist/

  server-lint:
    name: Server Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run server tests
        run: |
          cd server
          npm test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install client dependencies
        run: |
          cd client
          rm -f package-lock.json
          npm install

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run security audit (client)
        run: |
          cd client
          npm audit --audit-level=moderate

      - name: Run security audit (server)
        run: |
          cd server
          npm audit --audit-level=moderate

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check for outdated dependencies (client)
        run: |
          cd client
          npm outdated || true

      - name: Check for outdated dependencies (server)
        run: |
          cd server
          npm outdated || true

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd client
          rm -f package-lock.json
          npm install

      - name: Check TypeScript compilation
        run: |
          cd client
          npx tsc --noEmit

      - name: Check for unused dependencies
        run: |
          cd client
          npx depcheck || true
